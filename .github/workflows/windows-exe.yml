name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build HH Monitor.exe
        shell: pwsh
        run: ./scripts/build_windows_exe.ps1 -Name "HH Monitor" -Clean

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: HH-Monitor-windows-exe
          path: dist/HH Monitor.exe

      - name: Attach EXE to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HH Monitor.exe
          generate_release_notes: true
